name: Validate Template

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Install bundle
        working-directory: ios-newapp-template
        run: bundle install

      - name: Validate Ruby syntax
        run: |
          ruby -c ios-newapp-template/fastlane/Fastfile
          ruby -c ios-newapp-template/fastlane/Appfile
          ruby -c Formula/ios-fastlane-template.rb

      - name: Validate shell scripts
        run: |
          bash -n ios-newapp-template/scripts/create_project.sh
          bash -n ios-newapp-template/scripts/replace_placeholders.sh
          bash -n scripts/install.sh

      - name: Integration test installer
        run: |
          tmpdir="$(mktemp -d)"
          mkdir -p "$tmpdir/DemoApp/DemoApp.xcodeproj"
          bash ios-newapp-template/scripts/create_project.sh "$tmpdir/DemoApp"
          grep -q '^SCHEME=DemoApp$' "$tmpdir/DemoApp/fastlane/.env.default"
          grep -q '^APP_NAME=DemoApp$' "$tmpdir/DemoApp/fastlane/.env.default"
          grep -q '^SCHEME=DemoApp$' "$tmpdir/DemoApp/.env"
          grep -q '^APP_NAME=DemoApp$' "$tmpdir/DemoApp/.env"
          if bash ios-newapp-template/scripts/create_project.sh "$tmpdir/DemoApp"; then
            echo "Installer overwrote an existing fastlane setup unexpectedly"
            exit 1
          fi
          bash ios-newapp-template/scripts/create_project.sh "$tmpdir/DemoApp" --force

      - name: Integration test multi-project detection
        run: |
          tmpdir="$(mktemp -d)"
          mkdir -p "$tmpdir/MultiApp/AppOne.xcodeproj"
          mkdir -p "$tmpdir/MultiApp/AppTwo.xcodeproj"
          bash ios-newapp-template/scripts/create_project.sh "$tmpdir/MultiApp" > "$tmpdir/output.txt"
          if grep -q '^PROJECT=' "$tmpdir/MultiApp/fastlane/.env.default"; then
            echo "Project should not have been auto-selected in multi-project mode"
            exit 1
          fi
          grep -q 'Multiple projects detected' "$tmpdir/output.txt"
          grep -q 'Recommended explicit install command' "$tmpdir/output.txt"
          bash ios-newapp-template/scripts/create_project.sh "$tmpdir/MultiApp" --force --project AppOne.xcodeproj --scheme AppOne --app-name AppOne
          grep -q '^PROJECT=AppOne.xcodeproj$' "$tmpdir/MultiApp/fastlane/.env.default"

      - name: Integration test curl installer
        run: |
          tmpdir="$(mktemp -d)"
          archive="$tmpdir/template.tar.gz"
          repo_copy_root="$tmpdir/archive-root"
          mkdir -p "$tmpdir/TargetApp/TargetApp.xcodeproj"
          mkdir -p "$repo_copy_root/ios-fastlane-template-main"
          cp -R . "$repo_copy_root/ios-fastlane-template-main"
          rm -rf "$repo_copy_root/ios-fastlane-template-main/.git"
          tar -czf "$archive" -C "$repo_copy_root" ios-fastlane-template-main
          LOCAL_ARCHIVE_PATH="$archive" bash scripts/install.sh "$tmpdir/TargetApp"
          grep -q '^SCHEME=TargetApp$' "$tmpdir/TargetApp/fastlane/.env.default"
          grep -q '^APP_NAME=TargetApp$' "$tmpdir/TargetApp/fastlane/.env.default"
          grep -q '^SCHEME=TargetApp$' "$tmpdir/TargetApp/.env"

      - name: Validate fastlane lanes
        working-directory: ios-newapp-template
        run: |
          bundle exec fastlane lanes
          bundle exec fastlane ios validate_setup
          bundle exec fastlane ios precheck_assets
